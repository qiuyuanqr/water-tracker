<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="饮水">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<title>饮水</title>

<style>
/* ============================================================
   饮水 — iOS-native redesign
   Runs on iPhone. SF Pro + iOS list patterns + safe areas.
   ============================================================ */

:root {
    --bg: #F2F2F7;
    --bg-elev: #FFFFFF;
    --grouped-bg: #F2F2F7;
    --label: #000000;
    --label-sec: rgba(60,60,67,0.60);
    --label-ter: rgba(60,60,67,0.30);
    --label-quad: rgba(60,60,67,0.18);
    --separator: rgba(60,60,67,0.29);
    --separator-opaque: #C6C6C8;
    --fill-1: rgba(120,120,128,0.20);
    --fill-2: rgba(120,120,128,0.16);
    --fill-3: rgba(118,118,128,0.12);
    --fill-4: rgba(116,116,128,0.08);

    --blue: #007AFF;
    --cyan: #32ADE6;
    --teal: #30B0C7;
    --green: #34C759;
    --orange: #FF9500;
    --red: #FF3B30;
    --indigo: #5856D6;

    --water: #32ADE6;
    --water-deep: #0A84FF;

    /* Accent level colors */
    --lvl-survival: #FF9500;
    --lvl-normal:   #007AFF;
    --lvl-healthy:  #34C759;

    --radius-card: 16px;
    --radius-inner: 12px;

    --sa-top: env(safe-area-inset-top, 0px);
    --sa-bot: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #000000;
        --bg-elev: #1C1C1E;
        --grouped-bg: #000000;
        --label: #FFFFFF;
        --label-sec: rgba(235,235,245,0.60);
        --label-ter: rgba(235,235,245,0.30);
        --label-quad: rgba(235,235,245,0.18);
        --separator: rgba(84,84,88,0.65);
        --separator-opaque: #38383A;
        --fill-1: rgba(120,120,128,0.36);
        --fill-2: rgba(120,120,128,0.32);
        --fill-3: rgba(118,118,128,0.24);
        --fill-4: rgba(118,118,128,0.18);

        --blue: #0A84FF;
        --cyan: #64D2FF;
        --teal: #40C8E0;
        --green: #30D158;
        --orange: #FF9F0A;
        --red: #FF453A;
        --indigo: #5E5CE6;

        --water: #64D2FF;
        --water-deep: #0A84FF;
        --lvl-survival: #FF9F0A;
        --lvl-normal:   #0A84FF;
        --lvl-healthy:  #30D158;
    }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
*:not(input):not(textarea) { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
input, textarea { -webkit-user-select: text; user-select: text; }

html, body {
    height: 100%;
    background: var(--bg);
    overscroll-behavior-y: contain;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro", "PingFang SC", "Helvetica Neue", sans-serif;
    color: var(--label);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-size: 17px;
    line-height: 1.294;
    letter-spacing: -0.41px;
    padding-bottom: calc(var(--sa-bot) + 8px);
    overflow-x: hidden;
}

/* ============================================================
   NAVIGATION BAR + LARGE TITLE
   ============================================================ */
.scroll-root { min-height: 100vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom, 0px); }

.navbar {
    position: sticky; top: 0; z-index: 20;
    padding: calc(var(--sa-top) + 6px) 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
    background: transparent;
    transition: background 0.2s, backdrop-filter 0.2s, border-color 0.2s;
    border-bottom: 0.5px solid transparent;
}
.navbar.scrolled {
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom-color: var(--separator);
}
.navbar-inline-title {
    font-size: 17px; font-weight: 600; letter-spacing: -0.41px;
    color: var(--label);
    opacity: 0; transition: opacity 0.18s ease;
    pointer-events: none;
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, 0%);
    padding-top: calc(var(--sa-top) + 6px);
}
.navbar.scrolled .navbar-inline-title { opacity: 1; }

.nav-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--fill-4);
    display: flex; align-items: center; justify-content: center;
    color: var(--blue);
    border: 0; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
}
.nav-btn:active { background: var(--fill-1); transform: scale(0.92); }

.large-title-wrap {
    padding: 4px 20px 8px;
}
.large-title {
    font-size: 34px; font-weight: 700; line-height: 41px;
    letter-spacing: 0.37px;
    color: var(--label);
}
.large-subtitle {
    font-size: 15px; font-weight: 400; line-height: 20px;
    color: var(--label-sec);
    letter-spacing: -0.24px;
    margin-top: 2px;
}

/* ============================================================
   RING HERO CARD
   ============================================================ */
.content { padding: 0 16px; display: flex; flex-direction: column; gap: 20px; padding-top: 4px; padding-bottom: 20px; flex: 1; }
.content > :last-child { margin-top: auto; }

.hero-card {
    background: var(--bg-elev);
    border-radius: var(--radius-card);
    padding: 24px 20px 20px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 20px;
    align-items: center;
}

.ring {
    position: relative;
    width: 148px; height: 148px;
    flex-shrink: 0;
}
.ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--fill-2); stroke-width: 14; }
.ring-bar {
    fill: none;
    stroke: var(--water);
    stroke-width: 14;
    stroke-linecap: round;
    stroke-dasharray: 408.4;
    stroke-dashoffset: 408.4;
    transition: stroke-dashoffset 0.9s cubic-bezier(.22,.9,.28,1), stroke 0.3s ease;
    filter: drop-shadow(0 0 0 transparent);
}
.ring-bar.survival { stroke: var(--lvl-survival); }
.ring-bar.normal   { stroke: var(--lvl-normal); }
.ring-bar.healthy  { stroke: var(--lvl-healthy); }

.ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.ring-amount {
    font-family: -apple-system, "SF Pro Display", sans-serif;
    font-size: 38px; font-weight: 700;
    line-height: 1;
    letter-spacing: -0.9px;
    color: var(--label);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
}
.ring-unit {
    font-size: 13px; font-weight: 600;
    color: var(--label-sec);
    letter-spacing: -0.08px;
    margin-top: 2px;
}

.hero-meta {
    display: flex; flex-direction: column; gap: 10px;
    min-width: 0;
}
.hero-level {
    display: flex; align-items: center; gap: 6px;
}
.hero-level-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: color-mix(in srgb, var(--water) 14%, transparent);
    color: var(--water-deep);
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    letter-spacing: -0.08px;
}
.hero-level-badge.survival { background: color-mix(in srgb, var(--lvl-survival) 16%, transparent); color: var(--lvl-survival); }
.hero-level-badge.normal   { background: color-mix(in srgb, var(--lvl-normal) 14%, transparent); color: var(--lvl-normal); }
.hero-level-badge.healthy  { background: color-mix(in srgb, var(--lvl-healthy) 16%, transparent); color: var(--lvl-healthy); }
.hero-level-dot {
    width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}

.hero-target {
    font-size: 15px; font-weight: 400; color: var(--label-sec);
    letter-spacing: -0.24px;
    display: flex; align-items: baseline; gap: 6px;
    flex-wrap: wrap;
}
.hero-target b { font-weight: 600; color: var(--label); font-size: 17px; }

.hero-sublevels {
    display: flex; flex-direction: column; gap: 4px;
    margin-top: 2px;
}
.hero-sublevel {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--label-sec);
    letter-spacing: -0.08px;
}
.hero-sublevel .tier {
    width: 7px; height: 7px; border-radius: 50%;
}
.hero-sublevel .tier.s { background: var(--lvl-survival); }
.hero-sublevel .tier.n { background: var(--lvl-normal); }
.hero-sublevel .tier.h { background: var(--lvl-healthy); }
.hero-sublevel b { font-weight: 600; color: var(--label); margin-right: 2px; font-size: 13px; }
.hero-sublevel.active { color: var(--label); }
.hero-sublevel.active b { color: var(--label); }

/* ============================================================
   SECTION TITLE (iOS grouped header)
   ============================================================ */
.section-head {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0 16px 6px;
    font-size: 13px; font-weight: 400;
    color: var(--label-sec);
    letter-spacing: -0.08px;
    text-transform: uppercase;
}
.section-head .hint { font-size: 12px; letter-spacing: 0; color: var(--label-ter); text-transform: none; }

/* ============================================================
   QUICK-ADD TILES
   ============================================================ */
.quick-card {
    background: var(--bg-elev);
    border-radius: var(--radius-card);
    padding: 14px;
}
.quick-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}
.tile {
    background: var(--fill-4);
    border-radius: var(--radius-inner);
    border: 0;
    padding: 14px 6px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
    transition: transform 0.12s, background 0.15s;
    color: var(--label);
    font-family: inherit;
    position: relative;
    overflow: hidden;
}
.tile:active { transform: scale(0.94); background: var(--fill-2); }
.tile.pulse { animation: tilePulse 0.55s ease; }
@keyframes tilePulse {
    0% { background: var(--fill-4); }
    40% { background: color-mix(in srgb, var(--water) 28%, var(--fill-4)); }
    100% { background: var(--fill-4); }
}

.tile-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--water) 18%, transparent);
    display: flex; align-items: center; justify-content: center;
    color: var(--water-deep);
}
.tile-icon svg { display: block; }
.tile.custom .tile-icon {
    background: color-mix(in srgb, var(--orange) 18%, transparent);
    color: var(--orange);
}

.tile-amount {
    font-family: -apple-system, "SF Pro Display", sans-serif;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.41px;
    color: var(--label);
    font-feature-settings: "tnum" 1;
}
.tile-sub {
    font-size: 11px; color: var(--label-sec);
    letter-spacing: 0.06px;
    font-weight: 500;
    text-transform: uppercase;
    margin-top: -2px;
}

/* ============================================================
   TODAY RECORDS — iOS inset grouped list
   ============================================================ */
.list-card {
    background: var(--bg-elev);
    border-radius: var(--radius-card);
    overflow: hidden;
}
#listCard {
    height: 188px;
    display: flex;
    flex-direction: column;
}
#listCard #listRows {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
#listCard #listEmpty {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
#listCard #listEmpty .list-empty-drop { margin-bottom: 8px; }
.list-row {
    display: grid;
    grid-template-columns: 28px 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    min-height: 44px;
    position: relative;
    background: var(--bg-elev);
}
.list-row + .list-row::before {
    content: ""; position: absolute; left: 54px; right: 0; top: 0;
    height: 0.5px; background: var(--separator);
}
.list-row .drop {
    width: 26px; height: 26px; border-radius: 50%;
    background: color-mix(in srgb, var(--water) 18%, transparent);
    color: var(--water-deep);
    display: flex; align-items: center; justify-content: center;
}
.list-row .drop svg { width: 14px; height: 14px; }
.list-row .ml {
    font-size: 16px; font-weight: 600; color: var(--label);
    letter-spacing: -0.32px;
    font-feature-settings: "tnum" 1;
}
.list-row .ml em {
    font-style: normal; font-size: 12px; font-weight: 400;
    color: var(--label-sec); margin-left: 2px;
    letter-spacing: -0.08px;
}
.list-row .t {
    font-size: 13px; color: var(--label-sec);
    letter-spacing: -0.08px;
    font-feature-settings: "tnum" 1;
    margin-right: 4px;
}
.list-row .x {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--fill-4);
    border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--red);
    transition: background 0.15s, transform 0.1s;
}
.list-row .x:active { background: color-mix(in srgb, var(--red) 14%, transparent); transform: scale(0.9); }

.list-empty {
    padding: 36px 20px;
    text-align: center;
    color: var(--label-ter);
    font-size: 15px;
    letter-spacing: -0.24px;
}
.list-empty-drop {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--fill-4);
    color: var(--label-ter);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px;
}

.list-foot {
    padding: 10px 16px 12px;
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; color: var(--label-sec);
    letter-spacing: -0.08px;
    border-top: 0.5px solid var(--separator);
    background: var(--bg-elev);
}
.list-foot b { font-weight: 600; color: var(--label); font-feature-settings: "tnum" 1; }

/* ============================================================
   ARCHIVE CELL (single-row link)
   ============================================================ */
.archive-cell {
    background: var(--bg-elev);
    border-radius: var(--radius-card);
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 40px 1fr auto auto;
    gap: 14px; align-items: center;
    cursor: pointer;
    transition: background 0.15s;
}
.archive-cell:active { background: var(--fill-3); }
.archive-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--indigo);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
}
.archive-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.archive-title {
    font-size: 17px; font-weight: 600; color: var(--label);
    letter-spacing: -0.41px;
}
.archive-sub {
    font-size: 13px; color: var(--label-sec);
    letter-spacing: -0.08px;
    font-feature-settings: "tnum" 1;
}
.archive-chev {
    color: var(--label-ter);
    display: flex; align-items: center;
}

/* ============================================================
   SHEET (modal) — iOS .sheet style with grabber
   ============================================================ */
.sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.28);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 99;
}
.sheet-backdrop.show { opacity: 1; }

.sheet-overlay {
    position: fixed; inset: 0;
    display: none; align-items: flex-end; justify-content: center;
    z-index: 100;
}
.sheet-overlay.show { display: flex; }

.sheet {
    background: var(--bg);
    border-radius: 10px 10px 0 0;
    width: 100%; max-width: 540px;
    height: 540px;
    max-height: calc(100vh - 40px);
    display: flex; flex-direction: column;
    padding-bottom: var(--sa-bot);
    animation: sheetIn 0.32s cubic-bezier(.2,.9,.25,1);
    overflow: hidden;
    position: relative;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.14);
}
@keyframes sheetIn {
    from { opacity: 0; transform: translateY(36px); }
    to { opacity: 1; transform: none; }
}

.sheet-grabber {
    position: absolute; top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 5px; border-radius: 999px;
    background: var(--label-quad);
}
.sheet-head {
    padding: 18px 16px 10px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px;
    flex-shrink: 0;
}
.sheet-head .left { justify-self: start; display: flex; gap: 6px; }
.sheet-head .right { justify-self: end; display: flex; gap: 6px; }
.sheet-title {
    font-size: 17px; font-weight: 600;
    text-align: center;
    color: var(--label);
    letter-spacing: -0.41px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sheet-btn-link {
    border: 0; background: transparent;
    color: var(--blue);
    font-family: inherit; font-size: 17px;
    cursor: pointer;
    padding: 6px 2px;
}
.sheet-btn-link:active { opacity: 0.5; }
.sheet-btn-link.bold { font-weight: 600; }
.sheet-icon-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--fill-4);
    color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    border: 0; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
}
.sheet-icon-btn:active { background: var(--fill-1); transform: scale(0.9); }

.sheet-body {
    flex: 1; min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 6px 16px 16px;
}

/* ============================================================
   CUSTOM AMOUNT SHEET
   ============================================================ */
.amt-card {
    background: var(--bg-elev);
    border-radius: var(--radius-card);
    padding: 20px 18px 18px;
    margin-bottom: 14px;
}
.amt-value {
    display: flex; align-items: baseline; justify-content: center;
    gap: 6px;
    padding: 4px 0 18px;
}
.amt-input {
    border: 0; outline: none; background: transparent;
    font-family: -apple-system, "SF Pro Display", sans-serif;
    font-size: 56px; font-weight: 700;
    color: var(--label);
    letter-spacing: -1.2px;
    text-align: center;
    font-feature-settings: "tnum" 1;
    -moz-appearance: textfield;
    padding: 0; min-width: 40px;
    max-width: 80%;
}
.amt-input::-webkit-outer-spin-button,
.amt-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.amt-unit {
    font-size: 17px; font-weight: 600;
    color: var(--label-sec);
    letter-spacing: -0.41px;
}

.amt-quick {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding-top: 14px;
    border-top: 0.5px solid var(--separator);
}
.amt-q {
    padding: 11px 4px; border: 0;
    border-radius: 10px;
    background: var(--fill-4);
    color: var(--label);
    font-family: inherit; font-size: 15px; font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.24px;
    font-feature-settings: "tnum" 1;
    transition: background 0.15s, transform 0.1s;
}
.amt-q:active { background: var(--fill-1); transform: scale(0.95); }
.amt-q.active {
    background: var(--blue); color: #fff;
}

.sheet-cta {
    width: 100%;
    padding: 15px 16px;
    border-radius: 14px;
    border: 0;
    background: var(--blue); color: #fff;
    font-family: inherit;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.41px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
}
.sheet-cta:active { opacity: 0.8; transform: scale(0.99); }
.sheet-cta:disabled { opacity: 0.4; }

/* ============================================================
   CALENDAR SHEET
   ============================================================ */
.cal-month-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    white-space: nowrap;
}
.cal-month-title {
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.41px; color: var(--label);
    font-feature-settings: "tnum" 1;
    min-width: 88px; text-align: center;
}
.cal-nav-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--fill-4);
    color: var(--blue);
    border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
}
.cal-nav-btn:active { background: var(--fill-1); transform: scale(0.92); }

.cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    padding: 0 0 6px;
    font-size: 11px; font-weight: 600;
    color: var(--label-sec);
    letter-spacing: 0.06px;
    text-align: center;
    text-transform: uppercase;
}
.cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    background: var(--bg-elev);
    border-radius: var(--radius-card);
    padding: 8px;
}
.cal-day {
    height: 48px;
    position: relative;
    border-radius: 10px;
    background: transparent;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    overflow: hidden;
}
.cal-day:active { transform: scale(0.92); }
.cal-day.empty { pointer-events: none; background: transparent; }
.cal-day .d-num {
    font-size: 15px; font-weight: 500;
    color: var(--label);
    font-feature-settings: "tnum" 1;
    letter-spacing: -0.24px;
    z-index: 1;
}
.cal-day .d-ml {
    font-size: 9px; font-weight: 500;
    color: var(--label-sec);
    font-feature-settings: "tnum" 1;
    margin-top: 1px;
    z-index: 1;
    letter-spacing: 0;
}
.cal-day .d-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 42px; height: 42px;
    border: 2px solid transparent;
    border-radius: 50%;
    z-index: 0;
}
.cal-day.level-survival .d-ring { border-color: var(--lvl-survival); }
.cal-day.level-normal   .d-ring { border-color: var(--lvl-normal); }
.cal-day.level-healthy  .d-ring { border-color: var(--lvl-healthy); }
.cal-day.level-survival .d-ring { background: color-mix(in srgb, var(--lvl-survival) 10%, transparent); }
.cal-day.level-normal   .d-ring { background: color-mix(in srgb, var(--lvl-normal) 10%, transparent); }
.cal-day.level-healthy  .d-ring { background: color-mix(in srgb, var(--lvl-healthy) 12%, transparent); }
.cal-day.today .d-num { color: var(--blue); font-weight: 700; }
.cal-day.today::after {
    content: ""; position: absolute;
    top: calc(50% - 22px);
    left: calc(50% + 16px);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--blue);
    z-index: 2;
}
.cal-day.future { opacity: 0.35; pointer-events: none; }

.cal-legend {
    display: flex; justify-content: center; gap: 16px;
    padding: 14px 4px 4px;
    font-size: 12px; color: var(--label-sec);
    letter-spacing: -0.08px;
    flex-wrap: wrap;
}
.cal-legend .leg { display: inline-flex; align-items: center; gap: 5px; }
.cal-legend .leg-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid currentColor;
    background: color-mix(in srgb, currentColor 15%, transparent);
}
.cal-legend .s { color: var(--lvl-survival); }
.cal-legend .n { color: var(--lvl-normal); }
.cal-legend .h { color: var(--lvl-healthy); }
.cal-legend .empty { color: var(--label-ter); }
.cal-legend .empty .leg-dot { background: transparent; border-color: currentColor; }

.day-badge.survival { background: color-mix(in srgb, var(--lvl-survival) 16%, transparent); color: var(--lvl-survival); }
.day-badge.normal   { background: color-mix(in srgb, var(--lvl-normal) 14%, transparent); color: var(--lvl-normal); }

<script>
// ============================================================
// CORE DOMAIN
// ============================================================
const DAILY_TARGET = 2500;
const LEVEL_NORMAL = 2000;
const LEVEL_SURVIVAL = 1500;
const STORAGE_KEY = 'water_tracker_records_v2';
const STORAGE_KEY_V1 = 'water_tracker_records_v1';

let records = loadRecords();
let calView = { year: new Date().getFullYear(), month: new Date().getMonth() };
let dayView = null;
let customTarget = 'today';

function loadRecords() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
        const oldRaw = localStorage.getItem(STORAGE_KEY_V1);
        if (oldRaw) {
            const old = JSON.parse(oldRaw);
            const migrated = {};
            Object.keys(old).forEach(k => {
                const total = old[k] || 0;
                if (total > 0) migrated[k] = [{ id: uid(), ml: total, time: '—', ts: 0 }];
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
            return migrated;
        }
        return {};
    } catch { return {}; }
}
function saveRecords() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function todayKey() { return dateToKey(new Date()); }
function dateToKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatTime(d) {
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function formatKeyCN(key) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m-1, d);
    const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
    return `${m}月${d}日 ${weekdays[date.getDay()]}`;
}

function totalOf(key) {
    const list = records[key] || [];
    return list.reduce((s, r) => s + (r.ml || 0), 0);
}
function addRecord(key, ml) {
    if (!ml || ml <= 0) return;
    if (!records[key]) records[key] = [];
    const now = new Date();
    records[key].push({ id: uid(), ml, time: formatTime(now), ts: now.getTime() });
    saveRecords();
}
function removeRecord(key, id) {
    if (!records[key]) return;
    records[key] = records[key].filter(r => r.id !== id);
    if (records[key].length === 0) delete records[key];
    saveRecords();
}
function levelOf(ml) {
    if (ml >= DAILY_TARGET) return 'healthy';
    if (ml >= LEVEL_NORMAL) return 'normal';
    return 'survival';
}
function levelCN(lvl) { return lvl === 'healthy' ? '健康' : lvl === 'normal' ? '正常' : '活着'; }

// ============================================================
// UI UPDATES
// ============================================================
const RING_C = 2 * Math.PI * 65; // 408.407
function updateUI() {
    const total = totalOf(todayKey());
    const lvl = levelOf(total);
    const pct = Math.min(1, total / DAILY_TARGET);

    // Ring
    const bar = document.getElementById('ringBar');
    bar.style.strokeDashoffset = (RING_C * (1 - pct)).toFixed(2);
    bar.classList.remove('survival','normal','healthy');
    bar.classList.add(lvl);

    document.getElementById('ringAmount').textContent = total;
    document.getElementById('ringTarget').textContent = DAILY_TARGET;

    // Hero badge
    const badge = document.getElementById('heroBadge');
    badge.classList.remove('survival','normal','healthy');
    badge.classList.add(lvl);
    document.getElementById('heroBadgeText').textContent = levelCN(lvl);

    // Tier highlight
    ['H','N','S'].forEach(k => document.getElementById('tier'+k).classList.remove('active'));
    if (lvl === 'healthy') document.getElementById('tierH').classList.add('active');
    else if (lvl === 'normal') document.getElementById('tierN').classList.add('active');
    else document.getElementById('tierS').classList.add('active');

    // Date
    const now = new Date();
    const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
    document.getElementById('dateDisplay').textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · ${weekdays[now.getDay()]}`;

    // Archive sub
    document.getElementById('archiveSub').textContent = `${total} / ${DAILY_TARGET} 毫升 · ${levelCN(lvl)}`;

    renderList();
}

function renderList() {
    const list = (records[todayKey()] || []).slice().sort((a,b) => (b.ts||0) - (a.ts||0));
    const wrap = document.getElementById('listRows');
    const empty = document.getElementById('listEmpty');
    const foot = document.getElementById('listFoot');
    const total = totalOf(todayKey());

    document.getElementById('todayHint').textContent = `${list.length} 笔 · ${total} 毫升`;

    if (list.length === 0) {
        wrap.innerHTML = '';
        empty.style.display = '';
        foot.style.display = 'none';
        return;
    }
    empty.style.display = 'none';
    foot.style.display = '';
    document.getElementById('listTotal').textContent = total;

    wrap.innerHTML = list.map(r => `
        <div class="list-row" data-id="${r.id}">
            <div class="drop">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3s-6 7-6 11a6 6 0 0012 0c0-4-6-11-6-11z"/>
                </svg>
            </div>
            <span class="ml">${r.ml}<em>毫升</em></span>
            <span class="t">${r.time}</span>
            <button class="x" data-id="${r.id}" aria-label="撤销">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
            </button>
        </div>
    `).join('');

    wrap.querySelectorAll('.x').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            removeRecord(todayKey(), btn.dataset.id);
            updateUI();
            showToast('已撤销');
        });
    });
}

// ============================================================
// NAVBAR SCROLL
// ============================================================
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

// ============================================================
// MODAL / SHEET MANAGEMENT
// ============================================================
let modalStackZ = 100;
const sheetBackdrop = document.getElementById('sheetBackdrop');
function syncBackdrop() {
    const anyOpen = document.querySelector('.sheet-overlay.show') !== null;
    sheetBackdrop.classList.toggle('show', anyOpen);
}
function openSheet(modal) {
    modalStackZ += 1;
    modal.style.zIndex = modalStackZ;
    modal.classList.add('show');
    syncBackdrop();
}
function closeSheet(modal) {
    modal.classList.remove('show');
    syncBackdrop();
}
function closeAllSheets() {
    document.querySelectorAll('.sheet-overlay.show').forEach(m => m.classList.remove('show'));
    syncBackdrop();
}

// ============================================================
// TOAST
// ============================================================
let toastTimer = null;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

// ============================================================
// QUICK TILES
// ============================================================
document.querySelectorAll('.tile[data-amount]').forEach(card => {
    card.addEventListener('click', () => {
        const amount = parseInt(card.dataset.amount, 10);
        card.classList.remove('pulse'); void card.offsetWidth; card.classList.add('pulse');
        addRecord(todayKey(), amount);
        updateUI();
        showToast(`+${amount} 毫升 · 今日 ${totalOf(todayKey())} 毫升`);
        if (navigator.vibrate) navigator.vibrate(15);
    });
});

// ============================================================
// CUSTOM SHEET
// ============================================================
const customModal = document.getElementById('customModal');
const amtInput = document.getElementById('amtInput');
const customModalTitle = document.getElementById('customModalTitle');

function openCustomModal(target) {
    customTarget = target;
    customModalTitle.textContent = target === 'today' ? '自定义饮水量' : `为 ${formatKeyCN(dayView)} 添加`;
    amtInput.value = '';
    document.querySelectorAll('.amt-q').forEach(b => b.classList.remove('active'));
    openSheet(customModal);
    setTimeout(() => amtInput.focus(), 200);
}
document.getElementById('customBtn').addEventListener('click', () => openCustomModal('today'));
document.getElementById('customCancel').addEventListener('click', () => { amtInput.blur(); closeSheet(customModal); });
customModal.addEventListener('click', e => { if (e.target === customModal) closeAllSheets(); });

document.querySelectorAll('.amt-q').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.amt-q').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        amtInput.value = btn.dataset.val;
    });
});
document.getElementById('customConfirm').addEventListener('click', () => {
    const v = parseInt(amtInput.value, 10);
    if (!v || v <= 0) { showToast('请输入有效的饮水量'); return; }
    if (v > 5000) { showToast('单次最多 5000 毫升'); return; }
    const key = customTarget === 'today' ? todayKey() : dayView;
    addRecord(key, v);
    amtInput.blur();
    closeSheet(customModal);
    if (customTarget === 'today') {
        updateUI();
        showToast(`+${v} 毫升 · 今日 ${totalOf(todayKey())} 毫升`);
    } else {
        renderDayModal(dayView);
        renderCalendar();
        if (dayView === todayKey()) updateUI();
        showToast(`已添加 ${v} 毫升`);
    }
    if (navigator.vibrate) navigator.vibrate(15);
});
amtInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('customConfirm').click(); });

// ============================================================
// CALENDAR
// ============================================================
const calendarModal = document.getElementById('calendarModal');
function openCalendar() {
    const now = new Date();
    calView = { year: now.getFullYear(), month: now.getMonth() };
    renderCalendar();
    openSheet(calendarModal);
}
document.getElementById('archiveBtn').addEventListener('click', openCalendar);
document.getElementById('calClose').addEventListener('click', () => closeSheet(calendarModal));
calendarModal.addEventListener('click', e => { if (e.target === calendarModal) closeAllSheets(); });

document.getElementById('calPrev').addEventListener('click', () => {
    calView.month -= 1;
    if (calView.month < 0) { calView.month = 11; calView.year -= 1; }
    renderCalendar();
});
document.getElementById('calNext').addEventListener('click', () => {
    calView.month += 1;
    if (calView.month > 11) { calView.month = 0; calView.year += 1; }
    renderCalendar();
});

function renderCalendar() {
    const y = calView.year, m = calView.month;
    document.getElementById('calTitle').textContent = `${y}年 ${m+1}月`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const todayK = todayKey();
    const todayDate = new Date();

    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-day empty';
        grid.appendChild(empty);
    }
    for (let d = 1; d <= daysInMonth; d++) {
        const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const ml = totalOf(key);
        const cell = document.createElement('div');
        cell.className = 'cal-day';
        if (ml > 0) cell.classList.add('level-' + levelOf(ml));
        if (key === todayK) cell.classList.add('today');
        const cellDate = new Date(y, m, d);
        if (cellDate > todayDate && key !== todayK) cell.classList.add('future');

        cell.innerHTML = `
            <span class="d-ring"></span>
            <span class="d-num">${d}</span>
            <span class="d-ml">${ml > 0 ? ml : ''}</span>
        `;
        if (!cell.classList.contains('future')) {
            cell.addEventListener('click', () => openDayModal(key));
        }
        grid.appendChild(cell);
    }
    const filled = firstDay + daysInMonth;
    for (let i = filled; i < 42; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-day empty';
        grid.appendChild(empty);
    }
}

// ============================================================
// DAY MODAL
// ============================================================
const dayModal = document.getElementById('dayModal');
document.getElementById('dayClose').addEventListener('click', () => closeSheet(dayModal));
dayModal.addEventListener('click', e => { if (e.target === dayModal) closeAllSheets(); });

function openDayModal(key) {
    dayView = key;
    renderDayModal(key);
    openSheet(dayModal);
}

function renderDayModal(key) {
    const list = (records[key] || []).slice().sort((a,b) => (b.ts||0) - (a.ts||0));
    const total = totalOf(key);
    const lvl = levelOf(total);

    document.getElementById('dayModalTitle').textContent =
        key === todayKey() ? `今天 · ${formatKeyCN(key)}` : formatKeyCN(key);
    document.getElementById('dayTotal').textContent = total;
    document.getElementById('dayTarget').textContent = DAILY_TARGET;

    const badge = document.getElementById('dayBadge');
    badge.classList.remove('survival','normal','healthy');
    badge.classList.add(lvl);
    badge.textContent = levelCN(lvl);

    const fill = document.getElementById('dayProgressFill');
    fill.style.width = Math.min(100, total / DAILY_TARGET * 100) + '%';
    fill.classList.remove('survival','normal','healthy');
    fill.classList.add(lvl);

    document.getElementById('dayCount').textContent = `${list.length} 笔`;

    const rows = document.getElementById('dayListRows');
    const dayEmpty = document.getElementById('dayListEmpty');
    if (list.length === 0) {
        rows.innerHTML = '';
        dayEmpty.style.display = '';
    } else {
        dayEmpty.style.display = 'none';
        rows.innerHTML = list.map(r => `
            <div class="list-row" data-id="${r.id}">
                <div class="drop">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3s-6 7-6 11a6 6 0 0012 0c0-4-6-11-6-11z"/>
                    </svg>
                </div>
                <span class="ml">${r.ml}<em>毫升</em></span>
                <span class="t">${r.time}</span>
                <button class="x" data-id="${r.id}" aria-label="删除">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
                </button>
            </div>
        `).join('');
        rows.querySelectorAll('.x').forEach(btn => {
            btn.addEventListener('click', () => {
                removeRecord(key, btn.dataset.id);
                renderDayModal(key);
                renderCalendar();
                if (key === todayKey()) updateUI();
                showToast('已删除');
                if (navigator.vibrate) navigator.vibrate(10);
            });
        });
    }
}

document.querySelectorAll('.day-q[data-amount]').forEach(btn => {
    btn.addEventListener('click', () => {
        if (!dayView) return;
        const amount = parseInt(btn.dataset.amount, 10);
        addRecord(dayView, amount);
        renderDayModal(dayView);
        renderCalendar();
        if (dayView === todayKey()) updateUI();
        showToast(`+${amount} 毫升`);
        if (navigator.vibrate) navigator.vibrate(15);
    });
});
document.getElementById('dayCustomBtn').addEventListener('click', () => openCustomModal('day'));

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
    const payload = {
        app: 'water-tracker',
        version: 2,
        exportedAt: new Date().toISOString(),
        records: records,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `water-tracker-${dateToKey(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('已导出备份');
}
function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        let parsed;
        try { parsed = JSON.parse(e.target.result); }
        catch { showToast('无效 JSON'); return; }
        const incoming = (parsed && parsed.records && typeof parsed.records === 'object')
            ? parsed.records
            : (parsed && typeof parsed === 'object' ? parsed : null);
        if (!incoming) { showToast('格式不对'); return; }
        for (const k in incoming) {
            if (!Array.isArray(incoming[k])) { showToast('格式不对'); return; }
        }
        const dayCount = Object.keys(incoming).length;
        if (!confirm(`将覆盖当前所有饮水记录，导入 ${dayCount} 天的数据。确定吗？`)) return;
        records = incoming;
        saveRecords();
        renderCalendar();
        updateUI();
        showToast(`已导入 ${dayCount} 天`);
    };
    reader.onerror = () => showToast('读取失败');
    reader.readAsText(file);
}
document.getElementById('exportBtn').addEventListener('click', exportData);
const importFileInput = document.getElementById('importFile');
document.getElementById('importBtn').addEventListener('click', () => importFileInput.click());
importFileInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) importData(file);
    e.target.value = '';
});

// ============================================================
// INIT
// ============================================================
updateUI();
</script>
