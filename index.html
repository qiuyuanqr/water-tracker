<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="喝水">
    <meta name="theme-color" content="#0A84FF">
    <meta name="format-detection" content="telephone=no">
    <title>饮水记录</title>
    <style>
    /* ===== Base ===== */
    * {
        box-sizing: border-box; margin: 0; padding: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none; user-select: none;
    }
    input, textarea { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
    html, body { height: 100%; overscroll-behavior-y: contain; }
    html { background: #DCEEFB; }  /* matches body top so iOS bounce area isn't white */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(180deg, #DCEEFB 0%, #E3EEFA 100%);
        background-attachment: fixed;
        color: #1C1C1E;
        min-height: 100vh;
        overflow-x: hidden;
        padding:
            calc(env(safe-area-inset-top, 0px) + 10px)
            env(safe-area-inset-right, 0px)
            calc(env(safe-area-inset-bottom, 0px) + 4px)
            env(safe-area-inset-left, 0px);
        -webkit-font-smoothing: antialiased;
        position: relative;
        display: flex;
        flex-direction: column;
    }

    /* ===== Decorative bubbles ===== */
    .bg-decor { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bubble {
        position: absolute; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(90,200,250,0.3) 55%, rgba(10,132,255,0.06) 100%);
        filter: blur(6px); animation: floaty 12s ease-in-out infinite; opacity: 0.5;
    }
    .bubble.b1 { width: 200px; height: 200px; top: -70px; right: -60px; }
    .bubble.b2 { width: 130px; height: 130px; top: 35%; left: -50px; animation-delay: 2s; }
    .bubble.b3 { width: 100px; height: 100px; bottom: 18%; right: -30px; animation-delay: 4s; }
    .bubble.b4 { width: 70px;  height: 70px;  bottom: 5%;  left: 20%;   animation-delay: 6s; }
    @keyframes floaty {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-16px) scale(1.05); }
    }

    .app-container {
        max-width: 520px; width: 100%;
        margin: 0 auto; padding: 0 14px;
        position: relative; z-index: 1;
        flex: 1; display: flex; flex-direction: column;
    }

    /* ===== Header ===== */
    .app-header { text-align: center; padding: 4px 4px 12px; }
    .main-title {
        font-size: 26px; font-weight: 800; line-height: 1.1; letter-spacing: -0.3px;
        background: linear-gradient(135deg, #0A84FF 0%, #32ADE6 55%, #5AC8FA 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .subtitle { margin-top: 7px; font-size: 13.5px; color: #8E8E93; font-weight: 600; letter-spacing: 0.3px; }

    /* ===== Section common ===== */
    .section {
        background: rgba(255,255,255,0.78);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border-radius: 20px;
        padding: 12px 14px 14px;
        margin-bottom: 10px;
        box-shadow: 0 6px 16px rgba(10,132,255,0.08), 0 1px 3px rgba(0,0,0,0.04);
        border: 1px solid rgba(255,255,255,0.9);
    }
    .section-title {
        font-size: 15px; font-weight: 700; color: #3A3A3C; margin-bottom: 10px;
        letter-spacing: 0.2px; display: flex; align-items: center; justify-content: space-between;
    }
    .section-hint { font-size: 12px; font-weight: 500; color: #A8A8AE; }

    /* ===== Bottle progress ===== */
    .cylinder-container { display: flex; align-items: center; justify-content: center; gap: 18px; padding: 2px 0; }
    .bottle { position: relative; width: 116px; height: 206px; display: flex; flex-direction: column; align-items: center; }
    .bottle-cap {
        width: 42px; height: 12px;
        background: linear-gradient(180deg, #E6EEF7 0%, #C2D2E5 100%);
        border-radius: 6px 6px 3px 3px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), inset 0 -2px 3px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.08);
        border: 1px solid rgba(0,0,0,0.06);
        z-index: 4; margin-bottom: -2px;
    }
    .bottle-glass {
        position: relative; width: 116px; height: 196px;
        border-radius: 36px 36px 26px 26px;
        background: linear-gradient(180deg, rgba(255,255,255,0.75) 0%, rgba(235,245,255,0.55) 40%, rgba(220,235,250,0.45) 100%);
        border: 2px solid rgba(10,132,255,0.15);
        box-shadow:
            inset 3px 0 6px rgba(255,255,255,0.7),
            inset -4px 0 10px rgba(10,132,255,0.06),
            inset 0 -4px 10px rgba(0,0,0,0.06),
            inset 0 4px 8px rgba(255,255,255,0.5),
            0 12px 24px rgba(10,132,255,0.18),
            0 4px 8px rgba(10,132,255,0.08);
        overflow: hidden;
    }
    .bottle-fill {
        position: absolute; bottom: 0; left: 0; right: 0; height: 0%;
        background: linear-gradient(180deg, #FFC06B 0%, #FF9500 100%);
        transition: height 0.7s cubic-bezier(.2,.9,.2,1), background 0.4s ease;
        box-shadow: inset 0 2px 6px rgba(255,255,255,0.35);
    }
    .bottle-fill.level-normal { background: linear-gradient(180deg, #6FD1FB 0%, #0A84FF 100%); }
    .bottle-fill.level-healthy { background: linear-gradient(180deg, #8FE6A2 0%, #34C759 100%); }

    .wave-svg {
        position: absolute; left: -25%; width: 150%; height: 12px;
        animation: waveSlide 4s linear infinite;
    }
    .wave-svg path { fill: rgba(255,255,255,0.5); }
    .wave-svg-back { top: -5px; animation-duration: 5.5s; animation-direction: reverse; opacity: 0.55; }
    .wave-svg-back path { fill: rgba(255,255,255,0.35); }
    .wave-svg-front { top: -7px; }
    @keyframes waveSlide {
        0% { transform: translateX(0); }
        100% { transform: translateX(33.3%); }
    }

    .bottle-bubbles { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .bb {
        position: absolute; bottom: 4%; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), rgba(255,255,255,0.2));
        opacity: 0; animation: bubbleUp 4.5s ease-in infinite;
    }
    .bb.b1 { left: 28%; width: 7px; height: 7px; }
    .bb.b2 { left: 58%; width: 4px; height: 4px; animation-delay: 1.2s; animation-duration: 5.2s; }
    .bb.b3 { left: 72%; width: 9px; height: 9px; animation-delay: 2.4s; animation-duration: 5.8s; }
    @keyframes bubbleUp {
        0%   { transform: translateY(0) scale(0.6); opacity: 0; }
        15%  { opacity: 0.7; }
        80%  { opacity: 0.5; }
        100% { transform: translateY(-160px) scale(1.1); opacity: 0; }
    }

    .bottle-shine {
        position: absolute; left: 12px; top: 14px; width: 9px; height: 55%;
        background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.25) 60%, rgba(255,255,255,0) 100%);
        border-radius: 50%; filter: blur(1.5px); z-index: 2; pointer-events: none;
    }
    .bottle-glass::after {
        content: ''; position: absolute; right: 10px; top: 20%; width: 4px; height: 20%;
        background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0));
        border-radius: 50%; filter: blur(1px); pointer-events: none;
    }

    .bottle-emoji {
        position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
        font-size: 38px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.22));
        z-index: 3; animation: bob 3s ease-in-out infinite;
    }
    @keyframes bob {
        0%, 100% { transform: translate(-50%, -50%); }
        50% { transform: translate(-50%, -44%); }
    }
    .bottle-text {
        position: absolute; left: 0; right: 0; bottom: 14px;
        text-align: center; z-index: 3; color: #FFFFFF;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3), 0 0 12px rgba(0,0,0,0.15);
        font-weight: 800; padding: 0 6px;
    }
    .current-ml { font-size: 26px; letter-spacing: -0.3px; }
    .target-ml { font-size: 11.5px; font-weight: 700; opacity: 0.92; display: block; margin-top: 2px; letter-spacing: 0.2px; }

    /* Tick marks on the right edge of the bottle body, measuring-cup style.
       Bottle capacity is 2500ml (water fills to brim at goal). Glass is 196px tall:
       1500ml = 60% → 118px   |   2000ml = 80% → 157px
       The 2500 mark is implicit — bottle top itself is the "健康" line. */
    .bottle-tick {
        position: absolute;
        right: -3px;          /* half-embedded in the bottle's right edge */
        width: 14px;
        height: 3px;
        border-radius: 2px;
        z-index: 5;
        pointer-events: none;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.7), 0 1px 2px rgba(0,0,0,0.12);
    }
    .bottle-tick.t-2000 { bottom: 157px; background: #0A5FCC; }  /* darker blue  */
    .bottle-tick.t-1500 { bottom: 118px; background: #B96600; }  /* darker orange */

    .level-indicators { display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: #3A3A3C; }
    .level-item {
        display: flex; align-items: center; gap: 7px; font-weight: 600;
        padding: 5px 9px 5px 7px; border-radius: 9px;
        background: transparent; transition: background 0.3s ease;
    }
    .level-item.active {
        background: linear-gradient(135deg, rgba(10,132,255,0.08), rgba(90,200,250,0.04));
        box-shadow: inset 0 0 0 1px rgba(10,132,255,0.1);
    }
    .level-dot {
        width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0;
        box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
    }
    .level-dot.orange { background: #FF9500; }
    .level-dot.blue { background: #0A84FF; }
    .level-dot.green { background: #34C759; }
    .level-text { display: flex; flex-direction: column; line-height: 1.15; gap: 3px; }
    .level-text .lt-line {
        display: inline-flex; align-items: center; gap: 4px;
        font-size: 14px; font-weight: 600; color: #3A3A3C;
        white-space: nowrap;
    }
    .level-text .lt-line b { font-weight: 700; }
    .level-text .lt-emoji { font-size: 13.5px; line-height: 1; }
    .level-text small { font-size: 11px; color: #8E8E93; font-weight: 600; }

    /* ===== Cups ===== */
    .cups-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .cup-card {
        display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        padding: 9px 4px 8px;
        background: linear-gradient(180deg, #FFFFFF, #F3F9FF);
        border-radius: 14px;
        border: 1.5px solid rgba(10,132,255,0.08);
        cursor: pointer;
        transition: transform 0.15s ease, background 0.2s ease;
        position: relative; overflow: hidden;
    }
    .cup-card:active { transform: scale(0.94); background: #E4EFFC; }
    .cup-card.pulse { animation: pulse 0.55s ease; }
    @keyframes pulse {
        0% { transform: scale(1); }
        35% { transform: scale(1.1); background: #CDE5FD; box-shadow: 0 0 0 6px rgba(10,132,255,0.12); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(10,132,255,0); }
    }
    .cup-icon { position: relative; width: 36px; height: 46px; margin-bottom: 6px; }
    .cup-body {
        width: 100%; height: 100%;
        background: linear-gradient(180deg, rgba(225,240,252,0.4), rgba(200,225,245,0.7));
        border: 2px solid #0A84FF;
        border-top: 2px solid rgba(10,132,255,0.3);
        border-radius: 3px 3px 12px 12px;
        position: relative; overflow: hidden;
    }
    .cup-water {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: linear-gradient(180deg, #5AC8FA 0%, #0A84FF 100%);
        transition: height 0.3s ease;
    }
    .cup-water::before {
        content: ''; position: absolute; top: -3px; left: 0; right: 0; height: 6px;
        background: rgba(255,255,255,0.45); border-radius: 50%;
    }
    .cup-handle {
        position: absolute; top: 12px; right: -7px; width: 10px; height: 18px;
        border: 2px solid #0A84FF; border-left: 0; border-radius: 0 8px 8px 0;
    }
    .cup-body.custom {
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(180deg, #FFF3E0, #FFE1AE);
        border-color: #FF9500;
    }
    .custom-cup .cup-handle { border-color: #FF9500; }
    .question-mark { font-size: 22px; font-weight: 800; color: #FF9500; line-height: 1; }
    .cup-label { font-size: 13px; font-weight: 700; color: #3A3A3C; letter-spacing: 0.2px; }

    /* ===== Today records list ===== */
    .today-records {
        margin-top: 10px; padding-top: 9px;
        border-top: 1px dashed rgba(10,132,255,0.15);
    }
    .today-records-header {
        display: flex; justify-content: space-between; align-items: baseline;
        font-size: 13.5px; font-weight: 700; color: #3A3A3C; margin-bottom: 7px;
    }
    .today-records-count { font-size: 12px; color: #8E8E93; font-weight: 600; }
    .today-records-list {
        display: flex; flex-wrap: wrap; gap: 6px;
        align-content: flex-start;
        height: 108px;               /* 3 rows × ~32px chip + 2×6px gap */
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-right: 2px;
    }
    .today-records-list::-webkit-scrollbar { width: 4px; }
    .today-records-list::-webkit-scrollbar-thumb { background: rgba(10,132,255,0.25); border-radius: 4px; }
    .today-records-list::-webkit-scrollbar-track { background: transparent; }

    .record-chip {
        display: inline-flex; align-items: center; gap: 6px;
        background: linear-gradient(135deg, #EEF5FD, #E2EEFB);
        border: 1px solid rgba(10,132,255,0.15);
        color: #0A84FF;
        padding: 6px 6px 6px 10px;
        border-radius: 999px;
        font-size: 12.5px; font-weight: 700;
        animation: chipIn 0.25s ease;
    }
    @keyframes chipIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    .record-chip .chip-time { color: #8E8E93; font-weight: 600; font-size: 11px; margin-right: 1px; }
    .record-chip .chip-del {
        width: 18px; height: 18px; border-radius: 50%;
        background: rgba(255,59,48,0.12); color: #FF3B30;
        border: 0; cursor: pointer; font-size: 13px; line-height: 1;
        display: flex; align-items: center; justify-content: center;
    }
    .record-chip .chip-del:active { background: rgba(255,59,48,0.22); }
    .empty-records { color: #A8A8AE; font-size: 13px; font-weight: 500; padding: 4px 4px; }

    /* ===== Calendar bar ===== */
    .calendar-section {
        padding: 0; background: transparent; box-shadow: none; border: 0; backdrop-filter: none;
        margin-top: auto;  /* push calendar bar to the bottom of the viewport */
        margin-bottom: 2px;
    }
    .calendar-bar {
        display: flex; align-items: center; gap: 12px;
        padding: 13px 18px;
        background: linear-gradient(135deg, #0A84FF 0%, #5AC8FA 100%);
        border-radius: 999px; color: #FFFFFF; cursor: pointer;
        box-shadow: 0 8px 18px rgba(10,132,255,0.32);
        transition: transform 0.18s ease;
    }
    .calendar-bar:active { transform: scale(0.97); }
    .calendar-bar-icon {
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center;
        font-size: 18px;
    }
    .calendar-bar-text { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .calendar-bar-title { font-size: 15.5px; font-weight: 700; }
    .calendar-bar-sub {
        font-size: 12.5px; opacity: 0.9; margin-top: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .calendar-bar-arrow { opacity: 0.9; flex-shrink: 0; }

    /* ===== Modal ===== */
    .modal-overlay {
        position: fixed; inset: 0; background: rgba(20,30,50,0.45);
        display: none; align-items: flex-end; justify-content: center;
        z-index: 100;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        animation: overlayIn 0.22s ease;
    }
    .modal-overlay.show { display: flex; }
    /* When a newer modal is opened on top, older overlays drop their dim + blur so
       the effect doesn't accumulate. Only the topmost overlay keeps the visual. */
    .modal-overlay.behind {
        background: transparent;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        animation: none;
    }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
        background: #FFFFFF;
        border-radius: 24px 24px 0 0;
        width: 100%; max-width: 520px;
        overflow: hidden;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.22);
        animation: sheetIn 0.3s cubic-bezier(.2,.8,.2,1);
        /* Fixed height so all three modals (calendar / day / custom) share the same
           sheet outline. A later-opened modal perfectly covers the earlier one,
           so the old modal never leaks out from behind. 580px fits the calendar
           grid + legend + data-actions + iPhone safe-area padding comfortably. */
        height: 580px;
        max-height: 90vh;
        display: flex; flex-direction: column;
        padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    @keyframes sheetIn {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @media (min-width: 560px) {
        .modal-overlay { align-items: center; padding: 20px; }
        .modal { border-radius: 22px; max-width: 440px; }
    }

    .modal-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px 12px; flex-shrink: 0;
    }
    .modal-header h3 { font-size: 17px; font-weight: 700; }
    .modal-close {
        width: 30px; height: 30px; border: 0; background: #F2F2F7; border-radius: 50%;
        font-size: 20px; color: #8E8E93; cursor: pointer; line-height: 1;
        display: flex; align-items: center; justify-content: center;
    }
    .modal-body {
        padding: 6px 20px 18px;
        overflow-y: auto; -webkit-overflow-scrolling: touch;
        flex: 1; min-height: 0;   /* fill fixed-height modal so footer sticks to bottom */
    }
    .modal-footer {
        display: flex; gap: 10px; padding: 12px 20px 18px;
        border-top: 1px solid #F2F2F7; flex-shrink: 0;
    }
    .btn {
        flex: 1; padding: 13px 16px; border: 0; border-radius: 14px;
        font-size: 15px; font-weight: 700; cursor: pointer;
        transition: transform 0.15s ease;
    }
    .btn-cancel { background: #F2F2F7; color: #3A3A3C; }
    .btn-cancel:active { background: #E5E5EA; }
    .btn-confirm {
        background: linear-gradient(135deg, #0A84FF, #32ADE6); color: white;
        box-shadow: 0 6px 14px rgba(10,132,255,0.3);
    }
    .btn-confirm:active { transform: scale(0.97); }

    .custom-input-group {
        display: flex; align-items: center;
        background: #F7FAFD; border-radius: 14px;
        padding: 4px 14px 4px 16px; border: 1.5px solid #E5EEF7;
    }
    .custom-amount-input {
        flex: 1; border: 0; outline: none; background: transparent;
        font-size: 22px; font-weight: 700; padding: 14px 0; color: #1C1C1E;
        -moz-appearance: textfield; min-width: 0;
    }
    .custom-amount-input::-webkit-outer-spin-button,
    .custom-amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .custom-unit { font-size: 15px; color: #8E8E93; font-weight: 700; }
    .quick-amounts {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
        margin-top: 14px;
    }
    .quick-btn {
        padding: 11px 4px; border: 1.5px solid #E5EEF7; background: #FFFFFF;
        border-radius: 11px; font-size: 13px; font-weight: 700; color: #3A3A3C;
        cursor: pointer; transition: transform 0.15s ease;
    }
    .quick-btn:active { transform: scale(0.94); }
    .quick-btn.active {
        background: #0A84FF; border-color: #0A84FF; color: #FFFFFF;
        box-shadow: 0 4px 10px rgba(10,132,255,0.3);
    }

    /* ===== Calendar modal ===== */
    .calendar-modal { max-width: 460px; }
    .calendar-nav { display: flex; align-items: center; justify-content: space-between; padding: 4px 20px 10px; }
    .cal-nav-btn {
        width: 32px; height: 32px; border: 0; background: #F2F2F7; border-radius: 50%;
        color: #3A3A3C; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
    }
    .cal-nav-btn:active { background: #E5E5EA; transform: scale(0.92); }
    .cal-nav-title { font-size: 16px; font-weight: 700; color: #1C1C1E; }
    .calendar-weekdays {
        display: grid; grid-template-columns: repeat(7, 1fr);
        padding: 4px 12px 6px; font-size: 11.5px; font-weight: 700; color: #8E8E93; text-align: center;
    }
    .calendar-grid {
        display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
        padding: 0 12px 12px;
    }
    .cal-day {
        aspect-ratio: 1 / 1;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        border-radius: 10px; font-size: 13px; font-weight: 600; color: #3A3A3C;
        background: #F4F6FA;
        position: relative; cursor: pointer;
        transition: transform 0.15s ease;
        border: 1.5px solid transparent;
    }
    .cal-day:active { transform: scale(0.94); }
    .cal-day.empty { background: transparent; cursor: default; pointer-events: none; }
    .cal-day .day-num { font-size: 14px; font-weight: 700; }
    .cal-day .day-sep {

    <script>
    // ===== Constants =====
    // Bottle capacity = daily goal = 2500ml. Water fills to the brim at 2500.
    // Tick marks at 1500 (60%) and 2000 (80%) visually line up with these water
    // levels. The 2500 mark is implicit — a full bottle IS the "健康" line.
    const DAILY_TARGET = 2500;
    const LEVEL_NORMAL = 2000;
    const LEVEL_SURVIVAL = 1500;
    const STORAGE_KEY = 'water_tracker_records_v2';
    const STORAGE_KEY_V1 = 'water_tracker_records_v1';

    // ===== State =====
    let records = loadRecords();
    let calView = { year: new Date().getFullYear(), month: new Date().getMonth() };
    let dayView = null;
    let customTarget = 'today';

    // ===== Persistence =====
    function loadRecords() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) return JSON.parse(raw);
            const oldRaw = localStorage.getItem(STORAGE_KEY_V1);
            if (oldRaw) {
                const old = JSON.parse(oldRaw);
                const migrated = {};
                Object.keys(old).forEach(k => {
                    const total = old[k] || 0;
                    if (total > 0) migrated[k] = [{ id: uid(), ml: total, time: '—', ts: 0 }];
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
                return migrated;
            }
            return {};
        } catch { return {}; }
    }
    function saveRecords() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
    function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

    // ===== Date helpers =====
    function todayKey() { return dateToKey(new Date()); }
    function dateToKey(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function formatTime(d) {
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    function formatKeyCN(key) {
        const [y, m, d] = key.split('-').map(Number);
        const date = new Date(y, m-1, d);
        const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
        return `${m}月${d}日 ${weekdays[date.getDay()]}`;
    }

    // ===== Record ops =====
    function totalOf(key) {
        const list = records[key] || [];
        return list.reduce((s, r) => s + (r.ml || 0), 0);
    }
    function addRecord(key, ml) {
        if (!ml || ml <= 0) return;
        if (!records[key]) records[key] = [];
        const now = new Date();
        records[key].push({ id: uid(), ml, time: formatTime(now), ts: now.getTime() });
        saveRecords();
    }
    function removeRecord(key, id) {
        if (!records[key]) return;
        records[key] = records[key].filter(r => r.id !== id);
        if (records[key].length === 0) delete records[key];
        saveRecords();
    }
    function levelOf(ml) {
        if (ml >= DAILY_TARGET) return 'healthy';
        if (ml >= LEVEL_NORMAL) return 'normal';
        return 'survival';
    }
    function emojiOf(ml) {
        if (ml >= DAILY_TARGET) return '👍';
        if (ml >= LEVEL_NORMAL) return '🙂';
        return '😩';
    }
    function levelTextOf(ml) {
        if (ml >= DAILY_TARGET) return `已喝 ${ml}ml · 健康 👍`;
        if (ml >= LEVEL_NORMAL)  return `已喝 ${ml}ml · 正常 🙂`;
        return `已喝 ${ml}ml · 活着 😩`;
    }

    // ===== UI today =====
    function updateUI() {
        const total = totalOf(todayKey());
        document.getElementById('currentMl').textContent = total;
        document.getElementById('targetMl').textContent = DAILY_TARGET;

        const fill = document.getElementById('cylinderFill');
        // Water fills to the brim at DAILY_TARGET (2500ml). Tick marks at 1500/2000
        // land on exact 60%/80% of glass height so water surface aligns with them.
        const pct = Math.min(100, (total / DAILY_TARGET) * 100);
        fill.style.height = pct + '%';
        const lvl = levelOf(total);
        fill.classList.remove('level-survival','level-normal','level-healthy');
        fill.classList.add('level-' + lvl);

        document.getElementById('cylinderEmoji').textContent = emojiOf(total);

        document.getElementById('lvHealthy').classList.toggle('active', lvl === 'healthy');
        document.getElementById('lvNormal').classList.toggle('active', lvl === 'normal');
        document.getElementById('lvSurvival').classList.toggle('active', lvl === 'survival');

        const now = new Date();
        const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
        document.getElementById('dateDisplay').textContent =
            `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;

        document.getElementById('calendarBarSub').textContent =
            `${total}ml / ${DAILY_TARGET}ml · ${levelTextOf(total).split('·').pop().trim()}`;

        renderTodayRecords();
    }

    function renderTodayRecords() {
        const list = (records[todayKey()] || []).slice().sort((a,b) => (b.ts||0) - (a.ts||0));
        const wrap = document.getElementById('todayRecordsList');
        document.getElementById('todayRecordsCount').textContent = `${list.length} 条 · ${totalOf(todayKey())}ml`;
        if (list.length === 0) {
            wrap.innerHTML = '<div class="empty-records">还没有记录，先喝一杯吧 💧</div>';
            return;
        }
        wrap.innerHTML = list.map(r => `
            <div class="record-chip" data-id="${r.id}">
                <span class="chip-time">${r.time}</span>
                <span>${r.ml}ml</span>
                <button class="chip-del" aria-label="删除" data-id="${r.id}">&times;</button>
            </div>
        `).join('');
        wrap.querySelectorAll('.chip-del').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                removeRecord(todayKey(), btn.dataset.id);
                updateUI();
                showToast('已撤销记录');
            });
        });
    }

    // ===== Modal stack (z-index management) =====
    // Each time a modal opens it gets a higher z-index than the previous one,
    // so a later-opened modal always sits on top. Paired with the fixed modal
    // height, the old modal is fully hidden behind the new one.
    //
    // syncBackdrop() enforces a second rule: only the TOPMOST overlay keeps its
    // dim + blur backdrop. Lower overlays get `.behind` which zeroes out their
    // background so the blur/darken effect doesn't accumulate across layers.
    let modalStackZ = 100;

    function syncBackdrop() {
        const openOverlays = Array.from(document.querySelectorAll('.modal-overlay.show'));
        if (openOverlays.length === 0) return;
        let top = openOverlays[0];
        for (const o of openOverlays) {
            if ((parseInt(o.style.zIndex) || 0) > (parseInt(top.style.zIndex) || 0)) top = o;
        }
        openOverlays.forEach(o => o.classList.toggle('behind', o !== top));
    }

    function openModal(modal) {
        modalStackZ += 1;
        modal.style.zIndex = modalStackZ;
        modal.classList.add('show');
        syncBackdrop();
    }
    function closeModal(modal) {
        modal.classList.remove('show');
        modal.classList.remove('behind');   // clear in case it's reopened later
        syncBackdrop();
    }

    // ===== Toast =====
    let toastTimer = null;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
    }

    // ===== Cups =====
    document.querySelectorAll('.cup-card[data-amount]').forEach(card => {
        card.addEventListener('click', () => {
            const amount = parseInt(card.dataset.amount, 10);
            card.classList.remove('pulse'); void card.offsetWidth; card.classList.add('pulse');
            addRecord(todayKey(), amount);
            updateUI();
            showToast(`+${amount}ml  今日 ${totalOf(todayKey())}ml`);
            if (navigator.vibrate) navigator.vibrate(15);
        });
    });

    // ===== Custom modal =====
    const customModal = document.getElementById('customModal');
    const customInput = document.getElementById('customAmountInput');
    const customModalTitle = document.getElementById('customModalTitle');

    function openCustomModal(target) {
        customTarget = target;
        customModalTitle.textContent = target === 'today' ? '自定义饮水量' : `为 ${formatKeyCN(dayView)} 添加`;
        customInput.value = '';
        document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
        openModal(customModal);
        setTimeout(() => customInput.focus(), 180);
    }
    document.getElementById('customCupBtn').addEventListener('click', () => openCustomModal('today'));
    document.getElementById('customModalClose').addEventListener('click', () => closeModal(customModal));
    document.getElementById('customCancelBtn').addEventListener('click', () => closeModal(customModal));
    customModal.addEventListener('click', e => { if (e.target === customModal) closeModal(customModal); });

    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            customInput.value = btn.dataset.val;
        });
    });
    document.getElementById('customConfirmBtn').addEventListener('click', () => {
        const v = parseInt(customInput.value, 10);
        if (!v || v <= 0) { showToast('请输入有效的饮水量'); return; }
        if (v > 5000) { showToast('单次最多 5000ml'); return; }
        const key = customTarget === 'today' ? todayKey() : dayView;
        addRecord(key, v);
        closeModal(customModal);
        if (customTarget === 'today') {
            updateUI();
            showToast(`+${v}ml  今日 ${totalOf(todayKey())}ml`);
        } else {
            renderDayModal(dayView);
            renderCalendar();
            if (dayView === todayKey()) updateUI();
            showToast(`已添加 ${v}ml`);
        }
        if (navigator.vibrate) navigator.vibrate(15);
    });
    customInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('customConfirmBtn').click(); });

    // ===== Calendar =====
    const calendarModal = document.getElementById('calendarModal');
    document.getElementById('calendarBar').addEventListener('click', () => {
        const now = new Date();
        calView = { year: now.getFullYear(), month: now.getMonth() };
        renderCalendar();
        openModal(calendarModal);
    });
    document.getElementById('calendarModalClose').addEventListener('click', () => closeModal(calendarModal));
    calendarModal.addEventListener('click', e => { if (e.target === calendarModal) closeModal(calendarModal); });

    document.getElementById('calPrev').addEventListener('click', () => {
        calView.month -= 1;
        if (calView.month < 0) { calView.month = 11; calView.year -= 1; }
        renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', () => {
        calView.month += 1;
        if (calView.month > 11) { calView.month = 0; calView.year += 1; }
        renderCalendar();
    });

    function renderCalendar() {
        const y = calView.year, m = calView.month;
        document.getElementById('calNavTitle').textContent = `${y}年 ${m+1}月`;
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m+1, 0).getDate();
        const todayK = todayKey();
        const todayDate = new Date();

        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'cal-day empty';
            grid.appendChild(empty);
        }
        for (let d = 1; d <= daysInMonth; d++) {
            const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const ml = totalOf(key);
            const cell = document.createElement('div');
            cell.className = 'cal-day';
            if (ml > 0) cell.classList.add('level-' + levelOf(ml));
            if (key === todayK) cell.classList.add('today');
            const cellDate = new Date(y, m, d);
            const isFuture = cellDate > todayDate && key !== todayK;

            cell.innerHTML = `
                <span class="day-num">${d}</span>
                <span class="day-sep"></span>
                <span class="day-ml">${ml > 0 ? ml : '—'}</span>
            `;
            if (!isFuture) {
                cell.addEventListener('click', () => openDayModal(key));
            } else {
                cell.style.opacity = '0.45';
                cell.style.cursor = 'default';
            }
            grid.appendChild(cell);
        }

        // Pad trailing empty cells so grid is always 6 rows × 7 cols = 42 cells.
        // Keeps calendar modal height constant across months (28/30/31 days, various starts).
        const filled = firstDay + daysInMonth;
        for (let i = filled; i < 42; i++) {
            const empty = document.createElement('div');
            empty.className = 'cal-day empty';
            grid.appendChild(empty);
        }
    }

    // ===== Day modal =====
    const dayModal = document.getElementById('dayModal');
    document.getElementById('dayModalClose').addEventListener('click', () => closeModal(dayModal));
    dayModal.addEventListener('click', e => { if (e.target === dayModal) closeModal(dayModal); });

    function openDayModal(key) {
        dayView = key;
        renderDayModal(key);
        openModal(dayModal);
    }
    function renderDayModal(key) {
        const list = (records[key] || []).slice().sort((a,b) => (b.ts||0) - (a.ts||0));
        const total = totalOf(key);
        const lvl = levelOf(total);

        document.getElementById('dayModalTitle').textContent =
            key === todayKey() ? `今天 · ${formatKeyCN(key)}` : formatKeyCN(key);
        document.getElementById('dayTotalMl').textContent = total;
        document.getElementById('dayTargetMl').textContent = DAILY_TARGET;
        document.getElementById('daySummaryEmoji').textContent = emojiOf(total);
        document.getElementById('dayLevelText').textContent = levelTextOf(total);

        const fill = document.getElementById('dayProgressFill');
        fill.style.width = Math.min(100, total / DAILY_TARGET * 100) + '%';
        fill.classList.remove('level-survival','level-normal','level-healthy');
        fill.classList.add('level-' + lvl);

        document.getElementById('dayRecordsCount').textContent = `${list.length} 条`;

        const listWrap = document.getElementById('dayRecordsList');
        if (list.length === 0) {
            listWrap.innerHTML = '<div class="empty-records">还没有记录，点上方按钮添加</div>';
        } else {
            listWrap.innerHTML = list.map(r => `
                <div class="day-record-row">
                    <div class="rec-icon">💧</div>
                    <div class="rec-main">
                        <span class="rec-ml">${r.ml} ml</span>
                        <span class="rec-time">${r.time}</span>
                    </div>
                    <button class="rec-del" aria-label="删除" data-id="${r.id}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                    </button>
                </div>
            `).join('');
            listWrap.querySelectorAll('.rec-del').forEach(btn => {
                btn.addEventListener('click', () => {
                    removeRecord(key, btn.dataset.id);
                    renderDayModal(key);
                    renderCalendar();
                    if (key === todayKey()) updateUI();
                    showToast('已删除记录');
                    if (navigator.vibrate) navigator.vibrate(10);
                });
            });
        }
    }

    document.querySelectorAll('.day-add-btn[data-amount]').forEach(btn => {
        btn.addEventListener('click', () => {
            if (!dayView) return;
            const amount = parseInt(btn.dataset.amount, 10);
            addRecord(dayView, amount);
            renderDayModal(dayView);
            renderCalendar();
            if (dayView === todayKey()) updateUI();
            showToast(`已添加 ${amount}ml`);
            if (navigator.vibrate) navigator.vibrate(15);
        });
    });
    document.getElementById('dayCustomBtn').addEventListener('click', () => openCustomModal('day'));

    // ===== Export / Import data =====
    // JSON envelope lets us evolve the on-disk format later without breaking old backups.
    function exportData() {
        const payload = {
            app: 'water-tracker',
            version: 2,
            exportedAt: new Date().toISOString(),
            records: records,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const today = dateToKey(new Date());
        a.download = `water-tracker-${today}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast('已导出备份');
    }

    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            let parsed;
            try { parsed = JSON.parse(e.target.result); }
            catch { showToast('文件不是有效的 JSON'); return; }

            // Accept both the enveloped format and a raw records dict, for forgiveness.
            const incoming = (parsed && parsed.records && typeof parsed.records === 'object')
                ? parsed.records
                : (parsed && typeof parsed === 'object' ? parsed : null);
            if (!incoming) { showToast('文件格式不对'); return; }

            // Shape check: every value must be an array of record objects
            for (const k in incoming) {
                if (!Array.isArray(incoming[k])) { showToast('文件格式不对'); return; }
            }

            const dayCount = Object.keys(incoming).length;
            const msg = `将覆盖当前所有饮水记录，导入 ${dayCount} 天的数据。确定吗？\n（建议先点"导出备份"保存当前数据）`;
            if (!confirm(msg)) return;

            records = incoming;
            saveRecords();
            renderCalendar();
            updateUI();
            showToast(`已导入 ${dayCount} 天数据`);
        };
        reader.onerror = () => showToast('读取文件失败');
        reader.readAsText(file);
    }

    document.getElementById('exportDataBtn').addEventListener('click', exportData);
    const importFileInput = document.getElementById('importFileInput');
    document.getElementById('importDataBtn').addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) importData(file);
        e.target.value = '';  // allow re-importing the same file later
    });

    // ===== Init =====
    updateUI();
    </script>
</body>
</html>
